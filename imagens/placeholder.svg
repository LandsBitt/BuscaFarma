<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" role="img" aria-label="Sem foto disponível">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eaf2ff"/>
      <stop offset="1" stop-color="#d7e6ff"/>
    </linearGradient>
  </defs>
  <rect width="320" height="200" fill="url(#bg)"/>
  <g transform="translate(160 88)" fill="none" stroke="#1466e0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <rect x="-30" y="-30" width="60" height="60" rx="16"/>
    <line x1="0" y1="-15" x2="0" y2="15"/>
    <line x1="-15" y1="0" x2="15" y2="0"/>
  </g>
  <text x="160" y="150" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="600" fill="#5b6573">Foto não disponível</text>
